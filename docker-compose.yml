services:
  db:
    image: postgis/postgis:16-3.4
    container_name: umai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-umai}
      POSTGRES_USER: ${POSTGRES_USER:-umai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - umai-db-data:/var/lib/postgresql/data
      # Extension setup, executed once when the data volume is first created.
      - ./UmaiDatabase/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-umai} -d ${POSTGRES_DB:-umai}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./UmaiBackend
    container_name: umai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-umai}
      DB_USERNAME: ${POSTGRES_USER:-umai}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Includes the fictional development seed data by default.
      # Production must use `classpath:db/migration` alone.
      FLYWAY_LOCATIONS: ${FLYWAY_LOCATIONS:-classpath:db/migration,classpath:db/seed}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (openssl rand -base64 48)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      SUBMISSIONS_AUTO_PUBLISH: ${SUBMISSIONS_AUTO_PUBLISH:-true}
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8080/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  umai-db-data:
